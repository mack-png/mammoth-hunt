<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Mammoth Hunt</title>
<style>
  :root{ --bg:#14110d; --panel:#1e1a14; --ink:#efe6d4; --muted:#9b8f78; --line:#37301f; --accent:#d9a441; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg); color:var(--ink);
    font:15px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:flex-start; justify-content:center; padding:20px; gap:20px; flex-wrap:wrap; }
  h1{ font-size:20px; margin:0 0 2px; letter-spacing:.5px; }
  .sub{ color:var(--muted); font-size:12px; margin:0 0 12px; }
  #stage{ position:relative; }
  canvas{ background:#0e0c08; border:1px solid var(--line); border-radius:8px; touch-action:none; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; width:300px; }
  .lvl{ font-size:13px; color:var(--muted); }
  .lvl b{ color:var(--ink); font-size:15px; }
  .row{ display:flex; gap:8px; align-items:center; }
  .weapons{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:10px 0; }
  .wpn{ background:#262015; border:1px solid var(--line); border-radius:8px; padding:8px 4px; text-align:center; cursor:pointer; user-select:none; transition:.1s; }
  .wpn.sel{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .wpn .ico{ font-size:22px; } .wpn .nm{ font-size:12px; margin-top:2px; } .wpn .ct{ font-size:12px; color:var(--muted); }
  button{ font:inherit; background:var(--accent); color:#1a1206; border:0; border-radius:8px; padding:9px 12px; cursor:pointer; font-weight:600; }
  button.ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  button:disabled{ opacity:.4; cursor:default; }
  .bar{ height:12px; background:#2a2416; border-radius:6px; overflow:hidden; border:1px solid var(--line); }
  .bar>i{ display:block; height:100%; background:linear-gradient(90deg,#b9722a,#d9a441); width:0; transition:width .3s; }
  .stat{ display:flex; justify-content:space-between; font-size:13px; margin:6px 0; }
  .stat b{ color:var(--accent); }
  #log{ height:140px; overflow-y:auto; font-size:12px; color:var(--muted); background:#17130d; border:1px solid var(--line); border-radius:8px; padding:8px; margin-top:10px; }
  #log div{ margin-bottom:3px; }
  .legend{ font-size:11px; color:var(--muted); margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:3px 10px; }
  .legend i{ display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:middle; }
  .roster{ font-size:12px; color:var(--muted); margin-top:8px; }
  .hint{ font-size:12px; color:var(--muted); margin-top:8px; min-height:32px; }
</style>
</head>
<body>
  <div id="stage">
    <h1>🦣 Mammoth Hunt</h1>
    <p class="sub">Set your ambush. Prey flee, predators hunt — terrain and position decide who feeds.</p>
    <canvas id="c" width="600" height="600"></canvas>
  </div>

  <div class="panel">
    <div class="lvl">Level <b id="levelno">1</b> — <b id="levelname">First Blood</b></div>
    <div class="roster" id="roster"></div>
    <div class="stat" style="margin-top:10px"><span>Meat this level</span><span><b id="meat">0</b> / <span id="goal">0</span> lbs</span></div>
    <div class="bar"><i id="meatbar"></i></div>

    <div class="weapons" id="weapons"></div>
    <div class="row" style="margin-top:4px">
      <button id="start">Start Level ▶</button>
      <button id="reset" class="ghost">Restart Game</button>
    </div>
    <div class="hint" id="hint"></div>

    <div class="legend" id="legend"></div>
    <div id="log"></div>
  </div>

<script>
(() => {
  "use strict";

  // ---- Board -----------------------------------------------------------
  const N = 12;                       // fixed 12x12 arena
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const PX = canvas.width / N;
  const TICK = 0.20;                  // combat resolves every 0.20s

  // ---- Terrain (affects mobility + where hunters may stand) ------------
  const TERRAIN = {
    grass:  { name:"Grassland", color:"#3e5b2a", speed:1.00, walkable:true,  block:false },
    forest: { name:"Forest",    color:"#22401f", speed:0.55, walkable:true,  block:false },
    marsh:  { name:"Marsh",     color:"#3a3d2b", speed:0.40, walkable:true,  block:false },
    water:  { name:"Water",     color:"#1d3a4a", speed:0.30, walkable:false, block:false },
    rock:   { name:"Rock",      color:"#4a4438", speed:1.00, walkable:false, block:true  },
  };

  // ---- Weapons ---------------------------------------------------------
  const WEAPONS = {
    rock: { name:"Rock",  ico:"🪨", dmg:5,  color:"#9aa0a6" },
    spear:{ name:"Spear", ico:"🔱", dmg:10, color:"#d9a441" },
    net:  { name:"Net",   ico:"🕸️", dmg:2,  color:"#7fb0c9" }, // snares small prey, tangles big
  };

  // ---- Animals ---------------------------------------------------------
  // size [w,h] cells; step = grid steps/sec on grass; hit = per-tick hit odds
  const ANIMALS = {
    rabbit: { label:"Rabbit", emoji:"🐇", size:[1,1], hp:[4,6],   meat:6,   step:3.0, kind:"prey",
              hit:{rock:.30,spear:.20,net:.65}, color:"#c8b89a" },
    deer:   { label:"Deer",   emoji:"🦌", size:[2,1], hp:[12,16], meat:70,  step:2.3, kind:"prey",
              hit:{rock:.45,spear:.55,net:.35}, color:"#b98a52" },
    bison:  { label:"Bison",  emoji:"🐂", size:[3,2], hp:[40,52], meat:350, step:1.2, kind:"prey",
              hit:{rock:.55,spear:.70,net:.15}, color:"#7a5a3a" },
    mammoth:{ label:"Mammoth",emoji:"🦣", size:[6,2], hp:[70,90], meat:600, step:0.9, kind:"prey",
              hit:{rock:.50,spear:.75,net:.10}, color:"#6b5540" },
    wolf:   { label:"Wolf",   emoji:"🐺", size:[2,1], hp:[14,18], meat:25,  step:2.6, kind:"predator",
              attack:.35, hit:{rock:.40,spear:.60,net:.30}, color:"#8a8f96" },
    bear:   { label:"Bear",   emoji:"🐻", size:[2,2], hp:[42,54], meat:220, step:1.5, kind:"predator",
              attack:.45, hit:{rock:.45,spear:.65,net:.20}, color:"#5a4632" },
  };

  // ---- Levels ----------------------------------------------------------
  // Roster is FIXED per level. Map layout + spawn order randomize each attempt.
  const LEVELS = [
    { name:"First Blood",     goal:140,  roster:{rabbit:4,deer:3},
      terr:{forest:2,marsh:0,water:0,rock:1}, inv:{rock:5,spear:2,net:3} },
    { name:"The Deer Run",    goal:260,  roster:{rabbit:3,deer:6},
      terr:{forest:3,marsh:1,water:0,rock:1}, inv:{rock:5,spear:3,net:3} },
    { name:"Bison Plains",    goal:650,  roster:{deer:3,bison:3},
      terr:{forest:1,marsh:0,water:0,rock:2}, inv:{rock:6,spear:4,net:2} },
    { name:"Wolves at Dusk",  goal:240,  roster:{deer:5,wolf:3},
      terr:{forest:3,marsh:1,water:0,rock:1}, inv:{rock:5,spear:4,net:3} },
    { name:"Marshland",       goal:520,  roster:{rabbit:4,deer:4,bison:2},
      terr:{forest:1,marsh:3,water:2,rock:0}, inv:{rock:6,spear:4,net:4} },
    { name:"The Pack",        goal:230,  roster:{deer:4,wolf:5},
      terr:{forest:4,marsh:0,water:0,rock:1}, inv:{rock:6,spear:5,net:3} },
    { name:"Bear Country",    goal:900,  roster:{bison:3,bear:3},
      terr:{forest:2,marsh:0,water:0,rock:3}, inv:{rock:6,spear:6,net:2} },
    { name:"The Mammoth",     goal:850,  roster:{deer:3,bison:2,mammoth:1},
      terr:{forest:2,marsh:1,water:0,rock:1}, inv:{rock:7,spear:6,net:3} },
    { name:"Predator & Prey", goal:780,  roster:{deer:4,bison:2,wolf:4,bear:2},
      terr:{forest:3,marsh:1,water:0,rock:2}, inv:{rock:7,spear:6,net:4} },
    { name:"The Great Hunt",  goal:1500, roster:{bison:3,mammoth:2,wolf:3,bear:2},
      terr:{forest:3,marsh:2,water:1,rock:2}, inv:{rock:8,spear:7,net:5} },
  ];

  // ---- State -----------------------------------------------------------
  let state;

  function startLevel(idx) {
    const L = LEVELS[idx];
    state = Object.assign(state || {}, {
      levelIdx: idx,
      phase: "placing",                 // placing | running | won
      terrain: makeTerrain(L.terr),
      hunters: [],
      animals: [],
      queue: [],
      spawnTimer: 0,
      inv: { ...L.inv },
      sel: state ? state.sel : "rock",
      meat: 0,
      acc: 0,
      last: 0,
    });
    log(`— Level ${idx+1}: ${L.name} — need ${L.goal} lbs. New ground; place your hunters.`);
    renderUI();
  }

  function makeTerrain(terr) {
    const g = Array.from({length:N}, () => Array.from({length:N}, () => "grass"));
    const scatter = (type, count, blob) => {
      for (let k=0;k<count;k++){
        const cx = Math.floor(Math.random()*N), cy = Math.floor(Math.random()*N);
        const r = blob ? 1 + Math.floor(Math.random()*2) : 0;
        for (let y=cy-r;y<=cy+r;y++) for (let x=cx-r;x<=cx+r;x++){
          if (x>=0&&x<N&&y>=0&&y<N && Math.random()>0.25) g[y][x] = type;
        }
      }
    };
    scatter("forest", terr.forest, true);
    scatter("marsh",  terr.marsh,  true);
    scatter("water",  terr.water,  true);
    scatter("rock",   terr.rock,   false);
    return g;
  }

  // ---- Spawning --------------------------------------------------------
  function buildRoster(L) {
    const pool = [];
    for (const k in L.roster) for (let i=0;i<L.roster[k];i++) pool.push(k);
    for (let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    return pool.map(spawnFor);
  }

  function spawnFor(key) {
    const A = ANIMALS[key];
    const [w,h] = A.size;
    const horiz = Math.random() < 0.5;
    let dir, x, y;
    if (horiz) {
      const fromLeft = Math.random() < 0.5;
      dir = { x: fromLeft ? 1 : -1, y: 0 };
      y = pickLane(h, "h");
      x = fromLeft ? -w+1 : N-1;
    } else {
      const fromTop = Math.random() < 0.5;
      dir = { x: 0, y: fromTop ? 1 : -1 };
      x = pickLane(w, "v");
      y = fromTop ? -h+1 : N-1;
    }
    const [lo,hi] = A.hp;
    const hp = Math.round(lo + Math.random()*(hi-lo));
    return { key, dir, exit:dir, x, y, rx:x, ry:y, hp, maxhp:hp, rate:A.step,
             alive:true, done:false, entered:false, flash:0, prog:0, age:0 };
  }

  // pick an entry lane with the fewest blocking rocks in the crossing corridor
  function pickLane(span, axis) {
    let best = 0, bestBlocks = Infinity;
    for (let s=0; s<=N-span; s++){
      let blocks = 0;
      for (let i=0;i<N;i++) for (let j=0;j<span;j++){
        const cx = axis==="h" ? i : s+j, cy = axis==="h" ? s+j : i;
        if (TERRAIN[state.terrain[cy][cx]].block) blocks++;
      }
      if (blocks < bestBlocks || (blocks===bestBlocks && Math.random()<0.4)) { bestBlocks=blocks; best=s; }
    }
    return best;
  }

  // ---- Geometry --------------------------------------------------------
  function rectOf(a){ const [w,h]=ANIMALS[a.key].size; return {x:a.x,y:a.y,w,h}; }
  function rectDist(r1, r2){
    const dx = Math.max(r1.x - (r2.x+r2.w-1), r2.x - (r1.x+r1.w-1), 0);
    const dy = Math.max(r1.y - (r2.y+r2.h-1), r2.y - (r1.y+r1.h-1), 0);
    return Math.max(dx, dy);
  }
  function fullyOutside(r){ return r.x+r.w-1 < 0 || r.x >= N || r.y+r.h-1 < 0 || r.y >= N; }
  function anyInside(r){ return !fullyOutside(r); }
  function terrainSpeedAt(a){
    const r = rectOf(a);
    const lx = Math.min(N-1, Math.max(0, a.dir.x>0 ? r.x+r.w-1 : r.x));
    const ly = Math.min(N-1, Math.max(0, a.dir.y>0 ? r.y+r.h-1 : r.y));
    return TERRAIN[state.terrain[ly][lx]].speed;
  }
  // can this rect be occupied? blocks = rock. avoidHunters => prey won't enter hunter cells.
  function canOccupy(r, avoidHunters){
    for (let y=r.y;y<r.y+r.h;y++) for (let x=r.x;x<r.x+r.w;x++){
      if (x<0||x>=N||y<0||y>=N) continue;            // off-map = passable (leaving)
      if (TERRAIN[state.terrain[y][x]].block) return false;
    }
    if (avoidHunters) for (const hnt of state.hunters){
      if (hnt.x>=r.x && hnt.x<r.x+r.w && hnt.y>=r.y && hnt.y<r.y+r.h) return false;
    }
    return true;
  }

  // ---- AI: one grid step ----------------------------------------------
  const DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
  function aiStep(a){
    const A = ANIMALS[a.key];
    const r = rectOf(a);
    if (A.kind === "prey"){
      const threats = [
        ...state.animals.filter(x=>x.alive && ANIMALS[x.key].kind==="predator").map(rectOf),
        ...state.hunters.map(h=>({x:h.x,y:h.y,w:1,h:1})),
      ];
      const near = threats.length ? Math.min(...threats.map(t=>rectDist(r,t))) : 99;
      const fleeing = near <= 3 && a.age < 12;      // panic when hunted; eventually bolts for the exit
      let best=null, bestScore=-1e9;
      for (const [dx,dy] of DIRS){
        const nr = {x:r.x+dx, y:r.y+dy, w:r.w, h:r.h};
        if (!canOccupy(nr, true)) continue;          // prey never enter rock or hunter cells
        let score = 0;
        if (fleeing) score += (threats.length?Math.min(...threats.map(t=>rectDist(nr,t))):99) * 2;
        score += (dx*a.exit.x + dy*a.exit.y) * (fleeing ? 1.2 : 3);   // head for the exit
        score += Math.random()*0.3;
        if (score>bestScore){ bestScore=score; best=[dx,dy]; }
      }
      if (best){ a.x+=best[0]; a.y+=best[1]; }
    } else {
      // predator: chase nearest prey, else nearest hunter, else leave
      let target=null, td=1e9;
      for (const p of state.animals) if (p.alive && ANIMALS[p.key].kind==="prey"){
        const d=rectDist(r, rectOf(p)); if (d<td){ td=d; target=rectOf(p); }
      }
      for (const h of state.hunters){ const d=rectDist(r,{x:h.x,y:h.y,w:1,h:1}); if (d<td){ td=d; target={x:h.x,y:h.y,w:1,h:1}; } }
      let best=null, bestScore=-1e9;
      for (const [dx,dy] of DIRS){
        const nr = {x:r.x+dx, y:r.y+dy, w:r.w, h:r.h};
        if (!canOccupy(nr, false)) continue;         // predators may step onto prey/hunters
        let score = target ? -rectDist(nr, target) : (dx*a.exit.x + dy*a.exit.y);
        score += Math.random()*0.2;
        if (score>bestScore){ bestScore=score; best=[dx,dy]; }
      }
      if (best){ a.x+=best[0]; a.y+=best[1]; }
    }
    if (anyInside(rectOf(a))) a.entered = true;
    if (a.entered && fullyOutside(rectOf(a))){
      a.done = true; a.alive = false;
      log(`… a ${A.label} slipped off the map.`);
    }
  }

  // ---- Combat (fixed cadence) -----------------------------------------
  function resolveCombat(){
    // hunters strike adjacent/overlapping animals
    for (const hnt of state.hunters){
      if (hnt.dead) continue;
      const W = WEAPONS[hnt.weapon];
      for (const a of state.animals){
        if (!a.alive) continue;
        const A = ANIMALS[a.key];
        if (rectDist(rectOf(a), {x:hnt.x,y:hnt.y,w:1,h:1}) > 1) continue;
        if (Math.random() < A.hit[hnt.weapon]){
          const area = A.size[0]*A.size[1];
          if (hnt.weapon==="net" && area<=2){ a.hp = 0; log(`🕸️ Net snared a ${A.label}!`); }
          else { a.hp -= W.dmg; if (hnt.weapon==="net") a.rate *= 0.75; }
          a.flash = 1;
        }
      }
    }
    // predators may kill prey, and overrun hunters
    for (const a of state.animals){
      if (!a.alive) continue;
      const A = ANIMALS[a.key];
      if (A.kind !== "predator") continue;
      const r = rectOf(a);
      for (const p of state.animals){
        if (!p.alive || ANIMALS[p.key].kind!=="prey") continue;
        if (rectDist(r, rectOf(p)) <= 1 && Math.random() < A.attack){
          p.alive = false;
          log(`🩸 A ${A.label} brought down a ${ANIMALS[p.key].label} — no meat for you.`);
        }
      }
      for (const hnt of state.hunters){
        if (hnt.dead) continue;
        if (rectDist(r, {x:hnt.x,y:hnt.y,w:1,h:1}) <= 1 && Math.random() < A.attack){
          hnt.dead = true;
          log(`💀 A ${A.label} killed your ${WEAPONS[hnt.weapon].name} hunter!`);
        }
      }
    }
    // resolve kills → meat
    for (const a of state.animals){
      if (a.alive && a.hp <= 0){
        a.alive = false;
        state.meat += ANIMALS[a.key].meat;
        log(`✅ Caught a ${ANIMALS[a.key].label} — +${ANIMALS[a.key].meat} lbs (${state.meat} total).`);
      }
    }
    state.hunters = state.hunters.filter(h=>!h.dead);
    state.animals = state.animals.filter(a=>a.alive || a.flash>0);
  }

  // ---- Simulation step -------------------------------------------------
  function step(dt){
    if (state.phase !== "running") return;

    state.spawnTimer -= dt;
    if (state.queue.length && state.spawnTimer <= 0){
      state.animals.push(state.queue.shift());
      state.spawnTimer = 0.8;
    }

    for (const a of state.animals){
      if (!a.alive) continue;
      a.age += dt;
      a.prog += a.rate * terrainSpeedAt(a) * dt;
      while (a.prog >= 1 && a.alive){ a.prog -= 1; aiStep(a); }
    }

    state.acc += dt;
    while (state.acc >= TICK){ state.acc -= TICK; resolveCombat(); }

    for (const a of state.animals) if (a.flash>0) a.flash = Math.max(0, a.flash - dt*3);

    if (state.queue.length===0 && state.animals.filter(a=>a.alive).length===0) endWave();
  }

  function endWave(){
    const L = LEVELS[state.levelIdx];
    if (state.meat >= L.goal){
      if (state.levelIdx === LEVELS.length-1){
        state.phase = "won";
        log(`🏆 The Great Hunt is complete. You are the tribe's finest hunter!`);
        renderUI();
      } else {
        log(`🎉 Level cleared! ${state.meat}/${L.goal} lbs. Advancing…`);
        startLevel(state.levelIdx + 1);
      }
    } else {
      log(`Only ${state.meat}/${L.goal} lbs — the herd got away. New ground, try again.`);
      startLevel(state.levelIdx);       // re-randomize map + order, same roster
    }
  }

  // ---- Render ----------------------------------------------------------
  function draw(dt){
    for (let y=0;y<N;y++) for (let x=0;x<N;x++){
      ctx.fillStyle = TERRAIN[state.terrain[y][x]].color;
      ctx.fillRect(x*PX, y*PX, PX, PX);
    }
    ctx.strokeStyle = "rgba(0,0,0,.22)"; ctx.lineWidth = 1;
    for (let i=0;i<=N;i++){
      ctx.beginPath(); ctx.moveTo(i*PX,0); ctx.lineTo(i*PX,N*PX); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*PX); ctx.lineTo(N*PX,i*PX); ctx.stroke();
    }
    for (const h of state.hunters){
      const W = WEAPONS[h.weapon];
      ctx.fillStyle = "rgba(0,0,0,.35)"; ctx.fillRect(h.x*PX+5, h.y*PX+5, PX-10, PX-10);
      ctx.strokeStyle = W.color; ctx.lineWidth = 2; ctx.strokeRect(h.x*PX+5, h.y*PX+5, PX-10, PX-10);
      ctx.font = "22px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(W.ico, h.x*PX+PX/2, h.y*PX+PX/2+1);
    }
    for (const a of state.animals){
      const A = ANIMALS[a.key], [w,h] = A.size;
      // smooth render position toward logical cell
      const k = Math.min(1, dt*12);
      a.rx += (a.x - a.rx) * k; a.ry += (a.y - a.ry) * k;
      const px=a.rx*PX, py=a.ry*PX, pw=w*PX, ph=h*PX;
      ctx.globalAlpha = a.alive ? 1 : 0.4;
      ctx.fillStyle = a.flash>0 ? "#e86a4c" : A.color;
      roundRect(px+3, py+3, pw-6, ph-6, 8); ctx.fill();
      if (ANIMALS[a.key].kind==="predator"){ ctx.strokeStyle="#e0574a"; ctx.lineWidth=2; ctx.stroke(); }
      ctx.globalAlpha = 1;
      ctx.font = Math.min(ph-8, 30)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(A.emoji, px+pw/2, py+ph/2);
      if (a.alive){
        const bw=pw-10, frac=Math.max(0,a.hp/a.maxhp);
        ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(px+5, py+ph-8, bw, 4);
        ctx.fillStyle = A.kind==="predator" ? "#e0574a" : "#8fd06a"; ctx.fillRect(px+5, py+ph-8, bw*frac, 4);
      }
    }
  }
  function roundRect(x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  // ---- UI --------------------------------------------------------------
  function renderUI(){
    const L = LEVELS[state.levelIdx];
    document.getElementById("levelno").textContent = state.levelIdx+1;
    document.getElementById("levelname").textContent = L.name;
    document.getElementById("goal").textContent = L.goal;
    document.getElementById("meat").textContent = state.meat;
    document.getElementById("meatbar").style.width = Math.min(100, state.meat/L.goal*100)+"%";
    document.getElementById("roster").textContent = "Herd: " +
      Object.keys(L.roster).map(k=>`${ANIMALS[k].emoji}×${L.roster[k]}`).join("  ");

    const wrap = document.getElementById("weapons"); wrap.innerHTML = "";
    for (const k in WEAPONS){
      const W = WEAPONS[k];
      const el = document.createElement("div");
      el.className = "wpn" + (state.sel===k?" sel":"");
      el.innerHTML = `<div class="ico">${W.ico}</div><div class="nm">${W.name}</div><div class="ct">×${state.inv[k]}</div>`;
      el.onclick = () => { state.sel=k; renderUI(); };
      wrap.appendChild(el);
    }
    const start = document.getElementById("start");
    start.disabled = state.phase==="running";
    start.textContent = state.phase==="won" ? "You Win 🏆"
                      : state.phase==="running" ? "Hunting…" : "Start Level ▶";
    document.getElementById("hint").textContent = defaultHint();

    document.getElementById("legend").innerHTML =
      Object.values(TERRAIN).map(t=>`<span><i style="background:${t.color}"></i>${t.name} ×${t.speed.toFixed(2)}</span>`).join("");
  }
  function defaultHint(){
    if (state.phase==="won") return "Press Restart Game to hunt again.";
    if (state.phase==="running") return "The hunt is on — prey flee, predators close in.";
    return "Pick a weapon, click land to place a hunter. Click a hunter to remove it.";
  }
  function log(msg){
    const el = document.getElementById("log");
    const d = document.createElement("div"); d.textContent = msg;
    el.prepend(d); while (el.children.length>60) el.lastChild.remove();
  }
  let hintTimer;
  function flashHint(t){
    const h = document.getElementById("hint"); h.textContent = t;
    clearTimeout(hintTimer); hintTimer = setTimeout(()=> h.textContent = defaultHint(), 1800);
  }

  // ---- Input -----------------------------------------------------------
  canvas.addEventListener("pointerdown", (e)=>{
    if (state.phase !== "placing") return;
    const r = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX-r.left)/r.width*N);
    const y = Math.floor((e.clientY-r.top)/r.height*N);
    if (x<0||x>=N||y<0||y>=N) return;
    const idx = state.hunters.findIndex(h=>h.x===x && h.y===y);
    if (idx>=0){ state.inv[state.hunters[idx].weapon]++; state.hunters.splice(idx,1); renderUI(); return; }
    if (!TERRAIN[state.terrain[y][x]].walkable){ flashHint("Can't stand on that terrain."); return; }
    if (state.inv[state.sel] <= 0){ flashHint("No "+WEAPONS[state.sel].name+" hunters left."); return; }
    state.hunters.push({ x, y, weapon: state.sel }); state.inv[state.sel]--; renderUI();
  });

  document.getElementById("start").onclick = () => {
    if (state.phase !== "placing") return;
    if (state.hunters.length === 0){ flashHint("Place at least one hunter first."); return; }
    state.queue = buildRoster(LEVELS[state.levelIdx]);
    state.phase = "running";
    log(`The herd approaches — ${state.queue.length} animals.`);
    renderUI();
  };
  document.getElementById("reset").onclick = () => { state = null; startLevel(0); };

  // ---- Boot ------------------------------------------------------------
  function frame(t){
    if (!state.last) state.last = t;
    const dt = Math.min(0.05, (t - state.last)/1000); state.last = t;
    step(dt); draw(dt);
    requestAnimationFrame(frame);
  }
  startLevel(0);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
